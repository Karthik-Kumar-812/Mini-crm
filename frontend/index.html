<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme Studio — Get In Touch</title>
  <meta
    name="description"
    content="A demo business website whose contact form feeds directly into the Mini CRM lead management dashboard."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a href="#lead-form" class="visually-hidden">Skip to contact form</a>

  <header class="public-nav">
    <div class="container public-nav-inner">
      <a href="index.html" class="brand">
        <span class="brand-accent">&lt;</span>Acme Studio<span class="brand-accent">/&gt;</span>
      </a>
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
        <a class="btn btn-ghost btn-sm" href="login.html">Admin Login</a>
      </div>
    </div>
  </header>

  <main>
    <section class="public-hero">
      <div class="container">
        <span class="eyebrow">Client website</span>
        <h1>Let's build something together.</h1>
        <p>
          The form below is a real
          working <strong>lead capture form</strong> — every submission is
          stored, tracked, and managed through the Mini CRM admin dashboard.
        </p>
      </div>
    </section>

    <section id="lead-form" class="container public-form-wrap">
      <form class="form-card" id="lead-form-el" novalidate>
        <div class="form-row-2">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input id="name" name="name" type="text" placeholder="Jane Doe" />
            <div class="field-error" id="name-error"></div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" />
            <div class="field-error" id="email-error"></div>
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label for="phone">Phone <span style="opacity:.6">(optional)</span></label>
            <input id="phone" name="phone" type="tel" placeholder="+91 90000 00000" />
          </div>
          <div class="form-group">
            <label for="source">How did you hear about us?</label>
            <select id="source" name="source">
              <option value="Website Contact Form">Website Contact Form</option>
              <option value="Referral">Referral</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="Google Search">Google Search</option>
              <option value="Instagram">Instagram</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="message">Tell us about your project</label>
          <textarea id="message" name="message" rows="5" placeholder="I'm looking for help with..."></textarea>
          <div class="field-error" id="message-error"></div>
        </div>

        <button class="btn btn-primary" type="submit" id="submit-btn" style="width:100%;">
          Send Message
        </button>

        <div class="form-status" id="form-status" role="status"></div>
      </form>
    </section>
  </main>

  <footer class="public-footer">
    <div class="container">
      <p> Built to showcase the Mini CRM lead management system</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/public-lead-form.js"></script>
</body>
</html>
